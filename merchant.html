<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Profile — BigScope</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0D0D; --surface: #161616; --surface2: #1E1E1E;
    --border: #2A2A2A; --gold: #F5A623; --green: #00A651;
    --text: #F0EDE8; --muted: #7A7570; --danger: #E05A2B;
    --radius: 12px;
    --font-head: 'Syne', sans-serif; --font-body: 'Manrope', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,13,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--gold); text-decoration: none; }
  .nav-logo span { color: var(--text); }
  .btn-back { padding: 8px 18px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: var(--font-body); font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .btn-back:hover { border-color: var(--gold); color: var(--gold); }

  /* LOADER */
  .page-loader {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 60vh; gap: 16px;
  }
  .loader { display: flex; gap: 6px; }
  .loader span { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: bounce 0.6s ease infinite; }
  .loader span:nth-child(2) { animation-delay: 0.1s; }
  .loader span:nth-child(3) { animation-delay: 0.2s; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  /* HERO COVER */
  .cover {
    width: 100%; height: 320px;
    background: var(--surface2);
    position: relative; overflow: hidden;
  }
  .cover img { width: 100%; height: 100%; object-fit: cover; }
  .cover-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 30%, rgba(13,13,13,0.95) 100%);
  }
  .cover-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 80px; color: var(--muted); opacity: 0.3;
  }

  .profile-wrap {
    max-width: 900px; margin: -80px auto 0;
    padding: 0 24px 80px; position: relative; z-index: 1;
  }

  /* PROFILE HEADER */
  .profile-head {
    display: flex; align-items: flex-end; gap: 20px; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .profile-avatar {
    width: 100px; height: 100px;
    background: var(--surface); border: 3px solid var(--bg);
    border-radius: 16px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; flex-shrink: 0;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-info { flex: 1; min-width: 0; }
  .profile-cat { font-size: 12px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .profile-name { font-family: var(--font-head); font-size: 32px; font-weight: 800; line-height: 1.1; margin-bottom: 8px; }
  .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 5px;
    letter-spacing: 0.3px;
  }
  .badge-verified { background: rgba(0,166,81,0.15); color: var(--green); }
  .badge-featured { background: rgba(245,166,35,0.15); color: var(--gold); }
  .profile-meta { display: flex; gap: 20px; flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); }
  .meta-item svg { width: 14px; height: 14px; }

  /* ACTION BUTTONS */
  .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; margin-bottom: 32px; }
  .btn-wa {
    padding: 12px 24px;
    background: #25D366; color: #fff;
    border: none; border-radius: 9px; cursor: pointer;
    font-family: var(--font-body); font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 8px; transition: background 0.2s;
    text-decoration: none;
  }
  .btn-wa:hover { background: #1ebe59; }
  .btn-call {
    padding: 12px 24px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 9px; cursor: pointer;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    text-decoration: none;
  }
  .btn-call:hover { border-color: var(--gold); color: var(--gold); }
  .btn-ig {
    padding: 12px 24px;
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
    color: #fff;
    border: none; border-radius: 9px; cursor: pointer;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px; transition: opacity 0.2s;
    text-decoration: none;
  }
  .btn-ig:hover { opacity: 0.85; }

  /* GRID LAYOUT */
  .content-grid {
    display: grid; grid-template-columns: 1fr 320px; gap: 24px;
  }
  .main-col { min-width: 0; }
  .side-col { }

  /* CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--font-head); font-size: 16px; font-weight: 700;
    margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }

  /* GALLERY */
  .gallery {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px;
  }
  .gallery-item {
    aspect-ratio: 1; border-radius: 8px; overflow: hidden;
    background: var(--surface2); cursor: pointer; transition: transform 0.2s;
  }
  .gallery-item:hover { transform: scale(1.02); }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

  /* VIDEO */
  .video-wrap {
    border-radius: 10px; overflow: hidden; background: #000;
    margin-bottom: 12px;
  }
  .video-wrap video { width: 100%; display: block; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat-box {
    background: var(--surface2); border-radius: 8px; padding: 14px;
    text-align: center;
  }
  .stat-box .num { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--gold); }
  .stat-box .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* UPGRADE CTA */
  .upgrade-card {
    background: linear-gradient(135deg, rgba(245,166,35,0.1), rgba(0,166,81,0.05));
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
  }
  .upgrade-card h3 { font-family: var(--font-head); font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .upgrade-card p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .upgrade-btn {
    width: 100%; padding: 12px;
    background: var(--gold); color: #000;
    font-family: var(--font-body); font-size: 14px; font-weight: 700;
    border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s;
  }
  .upgrade-btn:hover { background: #e09c1a; }

  /* DETAIL LIST */
  .detail-list { display: flex; flex-direction: column; gap: 10px; }
  .detail-row { display: flex; align-items: start; gap: 12px; font-size: 14px; }
  .detail-label { color: var(--muted); min-width: 120px; flex-shrink: 0; }
  .detail-value { color: var(--text); font-weight: 500; }

  /* QUOTE */
  .quote {
    border-left: 3px solid var(--gold);
    padding: 16px 20px; background: var(--surface2); border-radius: 0 8px 8px 0;
    font-size: 15px; font-style: italic; color: var(--text); line-height: 1.7;
    margin-bottom: 16px;
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
  .lightbox-close {
    position: fixed; top: 20px; right: 20px;
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer;
  }

  @media (max-width: 700px) {
    .content-grid { grid-template-columns: 1fr; }
    .side-col { order: -1; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Big<span>Scope</span></a>
  <a href="index.html" class="btn-back">← Directory</a>
</nav>

<div id="pageLoader" class="page-loader">
  <div class="loader"><span></span><span></span><span></span></div>
  <p style="color:var(--muted);font-size:14px;">Loading profile…</p>
</div>

<div id="pageContent" style="display:none;">
  <!-- COVER -->
  <div class="cover" id="coverEl">
    <div class="cover-placeholder" id="coverPlaceholder">🏪</div>
    <div class="cover-overlay"></div>
  </div>

  <div class="profile-wrap">
    <!-- PROFILE HEADER -->
    <div class="profile-head">
      <div class="profile-avatar" id="avatarEl">🏪</div>
      <div class="profile-info">
        <div class="profile-cat" id="catEl"></div>
        <div class="profile-name" id="nameEl"></div>
        <div class="profile-badges" id="badgesEl"></div>
        <div class="profile-meta" id="metaEl"></div>
      </div>
    </div>

    <div class="action-row" id="actionsEl"></div>

    <!-- MAIN GRID -->
    <div class="content-grid">
      <div class="main-col">

        <!-- ABOUT -->
        <div class="card" id="aboutCard" style="display:none;">
          <div class="card-title">📋 About</div>
          <p id="descEl" style="color:var(--muted);line-height:1.7;font-size:14px;"></p>
        </div>

        <!-- INTERVIEW -->
        <div class="card" id="interviewCard" style="display:none;">
          <div class="card-title">🎙️ In Their Own Words</div>
          <div class="quote" id="uniquenessEl"></div>
          <div id="adviceEl" style="font-size:13px;color:var(--muted);"></div>
        </div>

        <!-- GALLERY -->
        <div class="card" id="galleryCard" style="display:none;">
          <div class="card-title">🖼️ Photos</div>
          <div class="gallery" id="galleryEl"></div>
        </div>

        <!-- VIDEO -->
        <div class="card" id="videoCard" style="display:none;">
          <div class="card-title">🎬 Video</div>
          <div id="videosEl"></div>
        </div>

      </div>
      <div class="side-col">

        <!-- STATS -->
        <div class="card" id="statsCard" style="display:none;">
          <div class="card-title">📊 Business Stats</div>
          <div class="stats-row" id="statsEl"></div>
        </div>

        <!-- DETAILS -->
        <div class="card">
          <div class="card-title">📌 Details</div>
          <div class="detail-list" id="detailsEl"></div>
        </div>

        <!-- UPGRADE CTA -->
        <div class="upgrade-card">
          <h3>Want More Customers?</h3>
          <p>Upgrade this listing to reach more buyers, get a featured placement, and unlock your full digital presence.</p>
          <button class="upgrade-btn" onclick="requestUpgrade()">Request Upgrade →</button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy5taBNr82BJkJyZJiVE0DjoTs6G9ON3U",
  authDomain: "merchant-intelligence.firebaseapp.com",
  projectId: "merchant-intelligence",
  storageBucket: "merchant-intelligence.firebasestorage.app",
  messagingSenderId: "1032906945513",
  appId: "1:1032906945513:web:245aec0df3dd87f0a0d178"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get('id');

function ipfs(cid) { return `https://gateway.pinata.cloud/ipfs/${cid}`; }
function waNum(p) { return p ? p.replace(/\s+/g,'').replace(/^0/,'234') : ''; }

window.requestUpgrade = function() {
  const name = document.getElementById('nameEl').textContent;
  alert(`Contact BigScope to upgrade "${name}" to a premium listing. WhatsApp: +234 XXX XXX XXXX`);
};

window.openLightbox = function(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('open');
};

async function load() {
  if (!id) {
    document.getElementById('pageLoader').innerHTML = '<p style="color:var(--muted)">No merchant ID provided.</p>';
    return;
  }

  try {
    const snap = await getDoc(doc(db, 'merchants', id));
    if (!snap.exists()) {
      document.getElementById('pageLoader').innerHTML = '<p style="color:var(--muted)">Business not found.</p>';
      return;
    }

    const d = snap.data();
    document.title = `${d.businessName} — BigScope`;

    // Cover
    if (d.images && d.images.length > 0) {
      const coverImg = document.createElement('img');
      coverImg.src = ipfs(d.images[0]);
      coverImg.alt = d.businessName;
      document.getElementById('coverPlaceholder').style.display = 'none';
      document.getElementById('coverEl').prepend(coverImg);
    }

    // Avatar
    if (d.images && d.images.length > 0) {
      document.getElementById('avatarEl').innerHTML = `<img src="${ipfs(d.images[0])}" alt="${d.businessName}">`;
    }

    // Category & name
    document.getElementById('catEl').textContent = d.category || 'Business';
    document.getElementById('nameEl').textContent = d.businessName;

    // Badges
    let badges = '';
    if (d.verified) badges += '<span class="badge badge-verified">✓ Verified</span>';
    if (d.featured) badges += '<span class="badge badge-featured">★ Featured</span>';
    document.getElementById('badgesEl').innerHTML = badges;

    // Meta
    let meta = '';
    if (d.location) meta += `<span class="meta-item"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2C6.69 2 4 4.69 4 8c0 4.25 6 10 6 10s6-5.75 6-10c0-3.31-2.69-6-6-6zm0 8.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>${d.location}</span>`;
    if (d.ownerName) meta += `<span class="meta-item"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>${d.ownerName}</span>`;
    document.getElementById('metaEl').innerHTML = meta;

    // Actions
    const wa = waNum(d.phone);
    let actions = '';
    if (wa) actions += `<a href="https://wa.me/${wa}" class="btn-wa" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.47 14.38c-.3-.15-1.77-.87-2.04-.97s-.47-.15-.67.15-.77.97-.94 1.17-.35.22-.65.07a8.16 8.16 0 01-2.4-1.48 9.04 9.04 0 01-1.66-2.07c-.17-.3-.02-.46.13-.61s.3-.35.45-.52.15-.3.22-.5.04-.37-.02-.52-.67-1.6-.91-2.19c-.24-.57-.49-.49-.67-.5H8.1c-.2 0-.52.07-.79.37S6.5 7.7 6.5 9.2s1.02 2.9 1.16 3.1 2 3.05 4.85 4.28a16.4 16.4 0 001.62.6c.68.22 1.3.19 1.79.11.55-.08 1.69-.69 1.93-1.36.24-.67.24-1.24.17-1.36s-.27-.2-.57-.35z"/><path d="M12 2A10 10 0 002 12a9.9 9.9 0 001.34 5L2 22l5.25-1.38A10 10 0 1012 2zm0 18.38a8.38 8.38 0 01-4.27-1.17l-.3-.18-3.12.82.83-3.04-.2-.31A8.38 8.38 0 1112 20.38z"/></svg>Chat on WhatsApp</a>`;
    if (d.phone) actions += `<a href="tel:${d.phone}" class="btn-call"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>${d.phone}</a>`;
    if (d.instagram) actions += `<a href="https://instagram.com/${d.instagram.replace('@','')}" class="btn-ig" target="_blank">📸 ${d.instagram}</a>`;
    document.getElementById('actionsEl').innerHTML = actions;

    // About
    if (d.description) {
      document.getElementById('descEl').textContent = d.description;
      document.getElementById('aboutCard').style.display = '';
    }

    // Interview
    if (d.uniqueness || d.advice) {
      if (d.uniqueness) document.getElementById('uniquenessEl').textContent = d.uniqueness;
      if (d.advice) document.getElementById('adviceEl').innerHTML = `<strong style="color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Advice:</strong><br><span>${d.advice}</span>`;
      document.getElementById('interviewCard').style.display = '';
    }

    // Gallery
    if (d.images && d.images.length > 0) {
      document.getElementById('galleryEl').innerHTML = d.images.map(cid =>
        `<div class="gallery-item" onclick="openLightbox('${ipfs(cid)}')"><img src="${ipfs(cid)}" alt="photo" loading="lazy"></div>`
      ).join('');
      document.getElementById('galleryCard').style.display = '';
    }

    // Videos
    if (d.videoCIDs && d.videoCIDs.length > 0) {
      document.getElementById('videosEl').innerHTML = d.videoCIDs.map(cid =>
        `<div class="video-wrap"><video src="${ipfs(cid)}" controls></video></div>`
      ).join('');
      document.getElementById('videoCard').style.display = '';
    }

    // Stats
    const stats = [];
    if (d.staffCount) stats.push({ num: d.staffCount, lbl: 'Staff' });
    if (d.yearsInBusiness) stats.push({ num: d.yearsInBusiness, lbl: 'Years' });
    if (d.dailyCustomers) stats.push({ num: `~${d.dailyCustomers}`, lbl: 'Customers/day' });
    if (stats.length > 0) {
      document.getElementById('statsEl').innerHTML = stats.map(s =>
        `<div class="stat-box"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`
      ).join('');
      document.getElementById('statsCard').style.display = '';
    }

    // Details
    const details = [];
    if (d.priceRange) details.push({ label: 'Price Range', value: d.priceRange });
    if (d.delivers) details.push({ label: 'Delivers', value: d.delivers });
    if (d.whatsappBusiness) details.push({ label: 'WA Business', value: d.whatsappBusiness });
    if (d.website) details.push({ label: 'Website', value: `<a href="${d.website}" target="_blank" style="color:var(--gold)">${d.website}</a>` });
    if (d.pipelineStage) details.push({ label: 'Status', value: d.pipelineStage });

    document.getElementById('detailsEl').innerHTML = details.map(r =>
      `<div class="detail-row"><span class="detail-label">${r.label}</span><span class="detail-value">${r.value}</span></div>`
    ).join('');

    // Show page
    document.getElementById('pageLoader').style.display = 'none';
    document.getElementById('pageContent').style.display = 'block';

  } catch (err) {
    document.getElementById('pageLoader').innerHTML = `<p style="color:var(--muted)">Error loading profile: ${err.message}</p>`;
  }
}

load();
</script>
</body>
</html>
